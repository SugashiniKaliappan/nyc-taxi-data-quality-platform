name: NYC Taxi Data Quality Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  data-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Download NYC Taxi datasets
        run: |
          mkdir -p data/raw
          curl -L -o data/raw/yellow_tripdata_2024-01.parquet https://d37ci6vzurychx.cloudfront.net/trip-data/yellow_tripdata_2024-01.parquet
          curl -L -o data/raw/yellow_tripdata_2024-02.parquet https://d37ci6vzurychx.cloudfront.net/trip-data/yellow_tripdata_2024-02.parquet

      - name: Run data quality pipeline
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
          QUALITY_SCORE_THRESHOLD: ${{ secrets.QUALITY_SCORE_THRESHOLD }}
 
        run: |
          python3 run_pipeline.py
